<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
        }
        .div1{
            background-color: blue;
            transform: translateX(300px);
        }
        .div2{
            background-color: black;
            transform: translateY(150px);
        }
        .div3{
            background-color: gray;
            transform: translate(100px, -80px)
        }
    </style>
</head>
<body>
    <!-- 1)ვებსაიტზე დაამატე 3 დივი, სამივე დივს მიეცი ზომები 200px 200px ,ასევე მიეცი უკანა ფონის სხვადასხვა ფერი,

შენიდავალებაა რომ პირველი დივი --- გადაადგილი მხოლოდ x ღერძზე 300px ით

შენი დავალებაა რომ მეორე დივი -- გადააადგილო მხოლოდ y ღერძზე 150px ით

შენი დავალებაა რომ მესამე დივი --- გადააადგილო x ღერძზე 100px ით და y ღერძზე -80px ით -->
    <div class="div1"></div>
    <div class="div2"></div>
    <div class="div3"></div>
</body>
</html>
