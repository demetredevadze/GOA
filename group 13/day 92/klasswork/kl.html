<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: red;
            animation-duration: 5s;
            animation-iteration-count: 1;
            animation-name: go;
        }
        @keyframes go{
            25%{
                background-color: green;
                border: 2px solid yellow;
                border-radius: 10px;
            }
            50%{
                background-color: yellow;
                border-radius: 30px;
                border: 2px solid green;
                transform: translateX(300PX);
            }
            75%{
                background-color: blueviolet;
                border-radius: 50px;
                border: 2px solid red;
                transform: rotate(180deg);
            }
            100%{
                background-color: orange;
                border-radius: 50%;
                border: 2px solid blue;
            }
        }
    </style>
</head>
<body>
    <!-- 1)შექმენით დივი რომელსაც აქვს ზომები და წითელი ფერი,შენი დავალებაა რომ შენი დივი---

0% ზე არ ქონდეს სტილები(ანუ ქონდეს ცსს ში მიცემულის სტულები)

25% ზე დივმა შეიცვალოს -- გახდეს მწვანე ფერის.მომრგვალდეს 10px ით და გაუჩნდეს ყვითელი ფერის ბორდერი

50% ზე დივმა შეიცვალოს -- გახდეს ყვითელი ფერის.მომრგვალდეს 30PX ით და გაუჩნდეს მწვანე ბორდერი,ასევე გადავიდეს მარჯვნივ 300PX ით

75% ზე დივმა შეიცვალოს -- გახდეს იასამნისფერი,მომრგვალდეს 50პხ ით და გაუჩნეს წითელი ბორდერი,ასევე დატრიალდეს 180deg ით

და ბოლოს 100% ზე დივმა შეიცვალოს -- გახდეს სტაფილოსფერი,მომრგვალდეს კუთხეები 50%ით და გაუჩნდეს ლურჯი ბორდერი ---- ანიმაცია რომ მორჩება დივმა შეინარჩუნოს 100% ზე მიღებული სტილები და საწყის სტილებს აღარ დაუბრუნდეს -->
  <div></div>
</body>
</html>
