<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            width: 600px ;
            height: 600px;
            grid-template-rows: repeat(4 , 150px);
            grid-template-columns: repeat(4 , 150px);
        }
        .div{
            grid-row: 1/5;
            grid-column: 1/5;
        }
    </style>
</head>
<body>
    <section>
        <div class="div"></div>
    </section>
</body>
</html>
