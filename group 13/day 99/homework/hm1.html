<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            width: 950px ;
            height: 960px;
            display: grid;
            grid-template-rows: repeat(3 , 300px);
            grid-template-columns: repeat(3 , 300px);
            gap: 20px;
            background-color:#112f34;
        }
        div{
            background-color: #23414B;
            border-radius: 20px;
            box-shadow: 0 6px 18px #0000002e;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .div1{
            grid-column: 2/3;
        }
        .div2{
            grid-column: 3/4;
        }
        .div3{
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .div4{
            grid-column: 2/3;
            grid-row: 2/3;
        }
        .div5{
            grid-column: 3/4;
            grid-row: 2/3;
        }
        .div6{
            grid-column: 1/2;
            grid-row: 3/4;
        }
        .div7{
            grid-column: 2/3;
            grid-row: 3/4;
        }
        .div8{
            grid-column: 3/4;
            grid-row: 3/4;
        }
        .div9{
            grid-column: 1/2;
            grid-row: 1/2;
        }
    </style>
</head>
<body>
    <section>
        <div class="div1">
            <img src="image-removebg-preview.png" alt="">
        </div>
        <div class="div2">
            <img src="image-removebg-preview (1).png" alt="">
        </div>
        <div class="div3">
            <img src="image-removebg-preview.png" alt="">
        </div>
        <div class="div4">
            <img src="image-removebg-preview (1).png" alt="">
        </div>
        <div class="div5">
            <img src="image-removebg-preview.png" alt="">
        </div>
        <div class="div6">
            <img src="image-removebg-preview (1).png" alt="">
        </div>
        <div class="div7">
            <img src="image-removebg-preview.png" alt="">
        </div>
        <div class="div8"></div>
        <div class="div9"></div>
    </section>
</body>
</html>
