<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: blue;
            transition: background-color 2s,  height 3s, width 1.5, border-radius 2.3s, transform 6s;
        }
        div:hover{
            background-color: aquamarine;
            height: 250px;
            width: 250px;
            border-radius: 50%;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <!-- 1)შექმენით დივი,მიეცით ზომები და მიეცით უკანა ფონის ფერი,შენი დავალებაა რომ hover ზე უკანა ფონის ფერი შეეცვალოს 2 წამში,სიმაღლე შეეცვალოს 3 წამში,სიგანე შეეცვალოს 1.5 წამში , გახდეს წრე 2.3 წამში , და დატრიალდეს 180deg ით 6 წამში, -->
     <div></div>
</body>
</html>
