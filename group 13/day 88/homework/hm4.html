<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 80px;
            width: 140px;
            transition: transform 2.5s , opacity 4s;
        }
        div:hover{
            transform: rotateY(180deg);
            background-color: aqua;
            opacity: 70%;
        }
    </style>
</head>
<body>
    <!-- 4)შექმენი სურათი.
hover-ზე:

დატრიალდეს rotateY(180deg)

opacity ოდნავ შემცირდეს

transform მოხდეს 2.5s ში

opacity 4s ში-->
    <div>
    </div>
</body>
</html>
