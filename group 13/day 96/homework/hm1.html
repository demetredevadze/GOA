<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            width: 1000px;
            height: 1000px;
            display: grid;
            grid-template-columns:200px 200px 200px 200px ;
            grid-template-rows:  333px 333px 333px;
            gap: 10px;
        }
        .div1{
            background-color: green;
            grid-row-start: 1;
            grid-row-end: 4;
        }
        .div2{
            background-color: green;
            grid-row-start: 1;
            grid-column-start: 2;
            grid-column-end: 4;
        }
        .div4{
            background-color: red;
            grid-row-start: 1;
            grid-column-start: 4;
            grid-column-end: 5;
        }
        .div5{
            background-color: yellow;
            grid-row-start: 2;
            grid-column-start: 2;
            grid-column-end: 3;
        }
        .div6{
            background-color: red;
            grid-row-start: 2;
            grid-column-start: 3;
            grid-column-end: 4;
        }
        .div7{
            background-color: yellow;
            grid-row-start: 3;
            grid-column-start: 3;
            grid-column-end: 4;
        }
        .div8{
            background-color: red;
            grid-row-start: 3;
            grid-column-start: 2;
            grid-column-end: 3;
        }
        .div9{
            background-color: green;
            grid-row-start: 2;
            grid-column-start: 4;
            grid-row-end: 4;
        }
    </style>
</head>
<body>
    <section>
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
        <div class="div5"></div>
        <div class="div6"></div>
        <div class="div7"></div>
        <div class="div8"></div>
        <div class="div9"></div>
    </section>
</body>
</html>
