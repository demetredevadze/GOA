<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
        }
        section{
            width: 1000px;
            height: 1000px;
            display: grid;
            grid-template-columns:  333px 333px 333px;
            grid-template-rows: 333px 333px 333px;
            gap: 15px;
        }
        .div1{
            background-color: fuchsia;
            grid-row-start: 1;
            grid-column-start: 1;
        }
        .div2{
            background-color: greenyellow;
            grid-row-start: 1;
            grid-column-start: 2;
        }
        .div3{
            background-color: green;
            grid-row-start: 1;
            grid-column-start: 3;
        }
        .div4{
            background-color: orange;
            grid-row-start: 2;
            grid-column-start: 1;
        }
        .div5{
            background-color: orange;
            grid-row-start: 3;
            grid-column-start: 1;
        }
        .div6{
            background-color: bisque;
            grid-row-start: 2;
            grid-column-start: 2;
            grid-column-end: 4;
            grid-row-end: 4;
        }
        .big{
            width: 300px;
            height: 1030px;
            display: grid;
            grid-template-columns: 150px 150px;
            grid-template-rows: 1030px;
            gap: 15px;
        }
        .div10{
            background-color: rgb(129, 129, 255);

        }
        .div11{
            background-color: blue;
        }
    </style>
</head>
<body>
    <section>
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
        <div class="div5"></div>
        <div class="div6"></div>
        <div class="div7"></div>
        <div class="div8"></div>
        <div class="div9"></div>
    </section>
    <div class="big">
        <div class="div10"></div>
        <div class="div11"></div>
    </div>
</body>
</html>
