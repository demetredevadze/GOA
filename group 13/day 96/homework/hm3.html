<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            width: 1000px;
            height: 500px;
            display: grid;
            grid-template-rows: 250px 250px;
            grid-template-columns: 250px 250px 250px 250px;
            gap: 10px;
        }
        .div1{
            background-color: green;
        }
        .div2{
            background-color: red;
            grid-column-start: 2;
            grid-column-end: 4;
        }
        .div3{
            background-color: greenyellow;
        }
        .div4{
            background-color: blue;
        }
        .div5{
            background-color: orange;
            grid-column-start: 2;
            grid-column-end: 4;
        }
        .div6{
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <section>
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
        <div class="div5"></div>
        <div class="div6"></div>
    </section>
</body>
</html>
