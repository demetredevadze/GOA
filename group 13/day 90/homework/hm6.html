<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
     <style>
        div{
            animation-duration: 3s;
            animation-delay: 1s;
            animation-name: go;
            animation-timing-function: 2;
        }
    @keyframes go{
            from{
                width: 150px;
                height: 150px;
                background-color: red;
            }
            to{
                width: 200px;
                height: 200px;
                transform: translateX(90px);
                background-color: blue;
            }
        }
    </style>
</head>
<body>
