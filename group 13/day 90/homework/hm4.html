<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 150px;
            height: 150px;
            animation-name: go;
            background-color: red;
            animation-duration: 2s;
            animation-timing-function: 5;
        }
    @keyframes go{
            from{
                width: 150px;
                height: 150px;
                background-color: red;
            }
            to{
                transform: rotate(360deg);
                background-color: blue;
            }
        }
    </style>
</head>
<body>
    <!-- 4)შექმენი ფოტო, რომელიც:

rotate(0deg) → rotate(360deg)

ხანგრძლივობა 2 წამი

ანიმაცია განმეორდეს 5 ჯერ
 -->
<div></div>
</body>
</html>
