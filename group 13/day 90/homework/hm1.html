<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 150px;
            width: 150px;
            background-color: blue;
            opacity: 0;
            animation-name: big;
            animation-delay: 3s;
            
            
            animation-duration: 2s;
        }

        @keyframes big{
            from{
                height: 150px;
                width: 150px;
                background-color: blue;
                opacity: 0;
            }
            to{
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- 1)შექმენი div მიეცი ფერი და ზომები, რომელიც:

თავიდან არის opacity: 0

ბოლოს ხდება opacity: 1

ანიმაცია გრძელდება 2 წამი

იწყება 3 წამის დაგვიანებით

მუშაობს მხოლოდ ერთხელ -->

    <div>

    </div>
</body>
</html>
