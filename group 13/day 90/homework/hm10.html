<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1{
            background-color: blue;
            margin-bottom: 20px;
            border-radius: 50%;
            animation-name: h;
            animation-duration: 0.5s;
            animation-iteration-count: infinite;
        }
        .div2{
            background-color: red;
            margin-bottom: 20px;
            border-radius: 50%;
            animation-delay: 0.2s;
            animation-name: h;
            animation-duration: 0.5s;
            animation-iteration-count: infinite;
        }
        .div3{
            background-color: green;
            margin-bottom: 20px;
            border-radius: 50%;
            animation-delay: 0.4s;
            animation-name: h;
            animation-duration: 0.5s;
            animation-iteration-count: infinite;
        }
        .div4{
            background-color: black;
            margin-bottom: 20px;
            border-radius: 50%;
            animation-delay: 0.6s;
            animation-name: h;
            animation-duration: 0.5s;
            animation-iteration-count: infinite;
        }
        .div5{
            background-color: aquamarine;
            margin-bottom: 20px;
            border-radius: 50%;
            animation-delay: 0.8s;
            animation-name: h;
            animation-duration: 0.5s;
            animation-iteration-count: infinite;
        }
        @keyframes h{
            from{

            }
            to{
                transform: translateY(-40px);
            }
        }

    </style>
</head>
<body>
    <!-- 10)გაქვს 5 პატარა წრე გვერდიგვერდ.

ყველას ერთი და იგივე ანიმაცია:

translateY(0) დან → translateY(-40px)

duration: 0.5 წამი

iteration-count: infinite

მაგრამ თითოეულს განსხვავებული delay:

პირველს 0s

მეორეს 0.2s

მესამეს 0.4s

მეოთხეს 0.6s

მეხუთეს 0.8s
 -->
<div class="div1"></div>
<div class="div2"></div>
<div class="div3"></div>
<div class="div4"></div>
<div class="div5"></div>
</body>
</html>
