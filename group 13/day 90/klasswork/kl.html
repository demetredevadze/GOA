<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: red;
            animation-name: redl;
            animation-duration: 4s;
        }
        @keyframes redl{
            from{

            }
            to{
                background-color: yellow;
                border-radius: 50%;
                box-shadow: 0px 0px 1px green;
                transform: translate(300px, 400px);
                border: 2px solid red;
            }
        }
    </style>
</head>
<body>
    <!-- 1)შექმენით ერთი დივი,მიეცით ზომები 200px 200px და წითელი ფერი , შექმენით ანიმაცია რომელიც --

ამ დივს გადაიყვანს ყვითელ ფერში , გახდის სრულიად მრგვალს , დაუმატებს მწვანე ჩრდილს , ჩამოიტანს ქვემოთ 300px ით და გაწევს მარჯვნივ 400px ( გამოიყენე transform translate()   ) ით , ასევე დაუმატებს 2px იან წითელ ბორდერს 

არ დაგავიწყდეთ div ზე animation name და duration ის გამოყენება,ამათ გარეშე ანიმაცია ვერ იმშავებს -->

    <div></div>
</body>
</html>
