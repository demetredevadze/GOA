<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-image: url("image.png");
            background-size: contain;
            background-repeat: no-repeat;
            animation-name: image;
            animation-delay: 5s;
            animation-timing-function: infinite;
        }
        @keyframes image{
            to{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- 2)გადმოწერეთ ეს ფოტო,დაამატეთ ვებსაიტზე 

თქვენი დავალება იქნება რომ ეს ფოტო ატრიალოთ 360deg ით ,საიტი რომ ჩაიტვირთებ ფოტოს ანიმაცია დაიწყოს 5s ში და 5 წამის შემდეგ სამუდამოდ იტრიალოს ჩვენმა ფოტომ -->
    <div></div>
</body>
</html>
