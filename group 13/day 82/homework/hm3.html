<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      div {
        width: 200px;
        height: 200px;
      }
      .div1 {
        background-color: green;
        z-index: 1;
      }
      .div2 {
        background-color: fuchsia;
        position: relative;
        right: 50px;
        top: 20px;
        z-index: 2;
      }
      .div3 {
        background-color: cyan;
        opacity: 60%;
        position: relative;
        left: 80px;
        top: 300px;
        z-index: 3;
      }
    </style>
  </head>
  <body>
    <div class="div3"></div>
    <div class="div2"></div>
    <div class="div1"></div>
  </body>
</html>
