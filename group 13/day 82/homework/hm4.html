<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      div {
        width: 150px;
        height: 150px;
        border-radius: 15px;
        border: 2px solid blue;
      }
      .div1 {
        background-color: black;
        z-index: 1;
      }
      .div2 {
        background-color: green;
        z-index: 2;
        position: relative;
        left: 110px;
        top: 260px;
      }
      .div3 {
        background-color: blue;
        z-index: 3;
        position: relative;
        left: 50px;
        top: 350px;
      }
    </style>
  </head>
  <body>
    <div class="div3"></div>
    <div class="div2"></div>
    <div class="div1"></div>
  </body>
</html>
