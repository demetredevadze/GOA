<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            gap: 10px;
        }
        div{
            width: 200px;
            height: 200px;
            background-color: red;
            border: 2px solid blue;
            transition: height 2s, width 2s;
        }
        div:hover{
            width: 150px;
            height: 150px;
        }
        .div2{
            transition-delay: 0.5s;
        }
        .div3{
            transition-delay: 1s;
        }
    </style>
</head>
<body>
    <!--10)შექმენი 3 ერთმანეთის გვერდით მდგომი ბლოკი.
Hover-ზე:

პირველი დაიწყოს მაშინვე

მეორე 0.5s delay-ით

მესამე 1s delay-ით

 -->


        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
</body>
</html>
