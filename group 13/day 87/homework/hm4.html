<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: aqua;
        }
        .div1{
            transition: ease 4s;
        }
        .div2{
            transition: linear 4s;
        }
        .div3{
            transition: ease-in 4s;
        }
        .div4{
            transition: ease-out 4s;
        }
        div:hover{
            transform: translateY(-40px) translateX(90px);
        }
    </style>

</head>
<body>
    <!-- 4)შექმენი 4 ბლოკი, თითოეულს მიეცი განსხვავებული timing-function:

ease

linear

ease-in

ease-out

Hover-ზე ყველა გადაადგილდეს მარჯვნივ 4 წამში.

დააკვირდი განსხვავებებს -->


        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
</body>
</html>
