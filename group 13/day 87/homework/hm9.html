<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: red;
            border: 2px solid blue;
            transition: background-color 3s, transform 3s;
        }
        div:hover{
            background-color: aqua;
            transform: scale(3);
        }
    </style>
</head>
<body>
    <!--9)შექმენი ბარათი.
Hover-ზე ერთდროულად შეიცვალოს:

background-color

border-radius

transform (scale)

ყველა განსხვავებული duration-ით.

 -->


        <div>
        </div>
</body>
</html>
