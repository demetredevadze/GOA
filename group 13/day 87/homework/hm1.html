<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: blue;
            transition: 1s;
        }
        div:hover{
            background-color: brown;
            width: 260px;
        }
    </style>
</head>
<body>
    <!-- 1)შექმენი <div> ბლოკი.
Hover-ზე შეიცვალოს:

background-color

width

გამოიყენე transition ისე, რომ ცვლილება იყოს გლუვი (ყველაფერი 1s ში). -->


        <div>

        </div>
</body>
</html>
