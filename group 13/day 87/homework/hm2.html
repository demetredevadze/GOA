<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: red;
            color: aqua;
            transition: 1s;

            background-color: blue;
            color: cadetblue;
        }
    </style>
</head>
<body>
    <!-- 2)შექმენი ღილაკი.

color

        <div>
            <h1>dd</h1>
        </div>
</body>
