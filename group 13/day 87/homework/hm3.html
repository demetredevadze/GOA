<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: red;
            color: aqua;
            transition: width 0.5s, height 1.5s;
        }
        div:hover{
            background-color: blue;
            width: 260px;
            height: 260px;
            color: cadetblue;
        }
    </style>
</head>
<body>
    <!-- 3)შექმენი ბლოკი.
Hover-ზე:

width შეიცვალოს 0.5s-ში

height შეიცვალოს 1.5s-ში -->


        <div>
        </div>
</body>
</html>
