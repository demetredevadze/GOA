<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            background-color: red;
            animation-delay: 4s;
            border-radius: 50%;
            transform: translateY(-40px);
            animation-iteration-count: infinite;
            animation-timing-function: ease-out;
            animation-name: go;
        }
        @keyframes go{
            from{
                transform: translateY(-20px);
                height: 120px;
            }
            to{

                transform: translateY(20px);
                background-color: blue;

            }
        }
    </style>
</head>
<body>
    <!-- 6)შექმენი ბურთი (div):

მუდმივად ხტუნავს ზემოთ-ქვემოთ

ყოველ ხტომაზე ოდნავ იწელება (stretch effect - ანუ სიგანე ეზდება სიმაღლე უპატარავდება)

ფერი იცვლება ყოველი მიწაზე დაცემისას

მიწასთან შეხებისას მოძრაობა ცოტა ნელდება (effect-ით)

 -->
    <div></div>
</body>
</html>
