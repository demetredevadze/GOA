    <style>
        p{
            height: 100px;
            width: 100px;
            background-color: blue;
            animation-duration: 3s;
            animation-direction: alternate;
            animation-name: go;
        }
        @keyframes go{
            from{
                transform: scale(1);
            }
            to{
                transform: scale(2);
                background-color: white;

            }
        }
    </style>
</head>
<body>
