<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            width: 1000px;
            height: 500px;
            display: grid;
            grid-template-columns:  250px  250px 250px 250px;
            grid-template-rows:  250px 250px;
            gap: 10px;
        }
        .div1{
            grid-row: 1/3;
            grid-column: 1/3;
            background-color: blueviolet; 
        }
        .div2{
            grid-column: 3/5;
            background-color: orange;
        }
        .div3{
            grid-column: 3/4;
            grid-row: 2/3;
            background-color: blueviolet;
        }
        .div4{
            grid-row-start: 2;
            grid-template-columns: 4;
            background-color: gray;
        }
    </style>
</head>
<body>
    <section>
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
    </section>
</body>
</html>
