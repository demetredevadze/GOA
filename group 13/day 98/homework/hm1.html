<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            width: 1000px;
            height: 700px;
            display: grid;
            grid-template-columns: 333px 333px 333px;
            grid-template-rows:  175px 175px 175px 175px;
            gap: 10px;
        }
        .div1{
            grid-column-start: 1;
            grid-column-end: 5;
            background-color: red;
        }
        .div2{
            grid-row-start: 2;
            grid-row-end: 4;
            background-color: orange;
        }
        .div3{
            grid-row-start: 2;
            grid-column-start: 2;
            background-color: rgb(0, 170, 173);
        }
        .div4{
            grid-row-start: 3;
            grid-column-start: 2;
            background-color: rgb(0, 170, 173);
        }
        .div5{
            grid-row-start: 2;
            grid-column-start: 3;
            background-color: rgb(0, 170, 173);
        }
        .div6{
            grid-row-start: 3;
            grid-column-start: 3;
            background-color: rgb(0, 170, 173);
        }
        .div7{
            grid-column-start: 1;
            grid-column-end: 4;
            background-color: red;
        }
    </style>
</head>
<body>
    <section>
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
        <div class="div5"></div>
        <div class="div6"></div>
        <div class="div7"></div>
    </section>
</body>
</html>
